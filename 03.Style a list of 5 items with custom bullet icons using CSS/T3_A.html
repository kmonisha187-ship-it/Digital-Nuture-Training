
<!DOCTYPE html>
<html>
<head>
    <title>Lists</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 40px;
        }

        h1 {
            color: #333;
            text-align: center;
        }

        ul {
            max-width: 400px;
            margin: 20px auto;
            padding: 0;
            list-style-type: none;
        }

        li {
            background-color: white;
            margin: 10px 0;
            padding: 12px 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            color: #444;
            transition: 0.3s;
        }

        li:hover {
            background-color: #e8f0fe;
            transform: scale(1.02);
        }
    </style>
</head>

<body>

    <h1>Items to Buy</h1>

    <ul>
        <li>Computer</li>
        <li>Laptop</li>
        <li>Mechanical Keyboard</li>
        <li>Gaming Mouse</li>
        <li>Monitor</li>
    </ul>

</body>
</html>
