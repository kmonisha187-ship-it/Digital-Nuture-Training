<!--01.Create a webpage with a navigation bar with 4 tabs with css-->

<!DOCTYPE html>
<html>
<head>
    <title>Navigation Bar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, serif;
        }

        nav {
            background-color: #1a1a2e;
            padding: 0 30px;
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li a {
            display: block;
            color: #e0e0e0;
            text-decoration: none;
            padding: 18px 22px;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        nav ul li a:hover {
            background-color: #e94560;
            color: white;
        }

        .content {
            padding: 40px 30px;
        }

        .content h1 {
            color: #1a1a2e;
            margin-bottom: 10px;
        }

        .content p {
            color: #555;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About us</a></li>
            <li><a href="#">Pricing</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <div class="content">
        <h1>Welcome to NeuroVoice</h1>
        <p>Brainprint based thought to speech communication system for mute and paralyzed people</p>
    </div>

</body>
</html>
