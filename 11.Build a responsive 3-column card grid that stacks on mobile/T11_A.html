<!DOCTYPE html>
<html >
<head>
    <title>Responsive Card Grid</title>

    <style>
        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
        }

        .card {
            border: 2px solid rgb(36, 76, 222);
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            background-color: #f4f4f4;
        }

        /* Mobile View */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="card">
            <h2>Card 1</h2>
            <p>This is card one.</p>
        </div>

        <div class="card">
            <h2>Card 2</h2>
            <p>This is card two.</p>
        </div>

        <div class="card">
            <h2>Card 3</h2>
            <p>This is card three.</p>
        </div>

    </div>

</body>
</html>
