<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery</title>

    <style>

        body{
            font-family:Arial;
            display:flex;
            justify-content:center;
            gap:20px;
            padding:40px;
        }

        .gallery{
            position:relative;
            width:250px;
        }

        .gallery img{
            width:100%;
            border-radius:10px;
        }

        .caption{
            position:absolute;
            bottom:0;
            width:100%;

            background:rgba(0,0,0,0.7);
            color:white;

            text-align:center;
            padding:10px;

            opacity:0;
            transition:0.3s;

            border-radius:0 0 10px 10px;
        }

        .gallery:hover .caption{
            opacity:1;
        }

    </style>
</head>
<body>

<div class="gallery">
    <img src="https://picsum.photos/250/180" alt="Image">
    <div class="caption">Beautiful Nature</div>
</div>

<div class="gallery">
    <img src="https://picsum.photos/251/180" alt="Image">
    <div class="caption">Mountain View</div>
</div>

</body>
</html>
