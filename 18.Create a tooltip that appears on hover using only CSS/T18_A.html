<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tooltip</title>
<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
    background:#f2f2f2;
}
.tooltip{
    position:relative;
    display:inline-block;
    cursor:pointer;
    font-size:22px;
    color:#333;
}
.tooltip-text{
    visibility:hidden;
    opacity:0;
    position:absolute;
    bottom:130%;
    left:50%;
    transform:translateX(-50%);
    background:#333;
    color:white;
    padding:8px 12px;
    border-radius:5px;
    font-size:14px;
    transition:0.3s;
}
.tooltip:hover .tooltip-text{
    visibility:visible;
    opacity:1;
}
</style>
</head>
<body>
<div class="tooltip">
    Hover Me
    <span class="tooltip-text">
        This is a tooltip
    </span>
</div>
</body>
</html>
